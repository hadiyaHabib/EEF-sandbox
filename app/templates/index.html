<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEF | Auto Evaluation Platform</title>
    <!-- Bootstrap CSS & FontAwesome Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .card-header { border-top-left-radius: 12px !important; border-top-right-radius: 12px !important; font-weight: 600; }
        .btn-primary { background-color: #4f46e5; border: none; font-weight: 600; }
        .btn-primary:hover { background-color: #4338ca; }
        .status-badge { font-weight: 600; padding: 6px 12px; border-radius: 30px; }
        .score-badge { font-weight: bold; font-size: 0.9rem; }
        .feedback-text { white-space: pre-line; font-family: 'Courier New', Courier, monospace; background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 4px solid #4f46e5; }
    </style>
</head>
<body>

    <!-- Top Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fa-solid fa-code-branch me-2"></i>EEF SANDBOX</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white active fw-bold" href="/"><i class="fa-solid fa-gauge me-1"></i> Dashboard</a>
                <a class="nav-link text-white" href="/leaderboard"><i class="fa-solid fa-trophy me-1 text-warning"></i> Leaderboard</a>
            </div>
        </div>
    </nav>

    <div class="container-fluid px-4">
        <div class="row">
            <!-- Left Side: Submission Form -->
            <div class="col-xl-3 col-lg-4 mb-4">
                <div class="card">
                    <div class="card-header bg-primary text-white"><i class="fa-solid fa-paper-plane me-2"></i> Submit Project</div>
                    <div class="card-body">
                        <form id="submissionForm">
                            <div class="mb-3">
                                <label class="form-label">Student ID</label>
                                <input type="text" class="form-control" id="studentId" placeholder="e.g., student_test_99" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">GitHub Repository URL</label>
                                <input type="url" class="form-control" id="githubUrl" placeholder="https://github.com/..." required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2"><i class="fa-solid fa-cloud-arrow-up me-2"></i> Submit & Auto Evaluate</button>
                        </form>
                        <div id="alertMessage" class="mt-3 d-none"></div>
                    </div>
                </div>
            </div>

            <!-- Right Side: Enhanced Submissions Table -->
            <div class="col-xl-9 col-lg-8">
                <div class="card">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <span><i class="fa-solid fa-list-check me-2"></i> Real-time Evaluation Logs</span>
                        <button class="btn btn-sm btn-outline-light" onclick="loadSubmissions()"><i class="fa-solid fa-rotate"></i> Refresh</button>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Student ID</th>
                                        <th>GitHub URL</th>
                                        <th>Status</th>
                                        <th>Code Quality</th>
                                        <th>Architecture</th>
                                        <th>Features Score</th>
                                        <th>AI Feedback</th>
                                        <th>Submitted At</th>
                                    </tr>
                                </thead>
                                <tbody id="submissionsTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap Modal for AI Feedback Popup -->
    <div class="modal fade" id="feedbackModal" tabindex="-1" aria-labelledby="feedbackModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="feedbackModalLabel"><i class="fa-solid fa-robot me-2 text-primary"></i> AI Evaluation Report</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <h6 class="fw-bold">Student ID: <span id="modalStudentId" class="text-primary"></span></h6>
                    <hr>
                    <div id="modalFeedbackContent" class="feedback-text">Loading feedback...</div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close Report</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS (Necessary for Modals) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_URL = "http://127.0.0.1:8000/api/v1/submissions";
        let localSubmissionsCache = []; // Temporary cache to hold submissions for modal view

        document.getElementById('submissionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const studentId = document.getElementById('studentId').value;
            const githubUrl = document.getElementById('githubUrl').value;
            const alertDiv = document.getElementById('alertMessage');

            alertDiv.className = "alert alert-info mt-3";
            alertDiv.innerHTML = `<i class="fa-solid fa-spinner fa-spin me-2"></i> Sandbox dynamic analysis chal rahi hai...`;
            alertDiv.classList.remove('d-none');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ student_id: studentId, github_url: githubUrl })
                });
                const data = await response.json();
                if (response.ok) {
                    alertDiv.className = "alert alert-success mt-3";
                    alertDiv.innerHTML = `<i class="fa-solid fa-circle-check me-2"></i> ${data.message}`;
                    document.getElementById('submissionForm').reset();
                    loadSubmissions();
                } else {
                    alertDiv.className = "alert alert-danger mt-3";
                    alertDiv.innerHTML = `<i class="fa-solid fa-circle-exclamation me-2"></i> ${data.detail}`;
                }
            } catch (err) {
                alertDiv.className = "alert alert-danger mt-3";
                alertDiv.innerHTML = `<i class="fa-solid fa-triangle-exclamation me-2"></i> Connection failed.`;
            }
        });

        async function loadSubmissions() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                localSubmissionsCache = data; // Save to cache
                const tbody = document.getElementById('submissionsTableBody');
                tbody.innerHTML = "";

                if(data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="8" class="text-center py-4 text-muted">No submissions evaluated yet.</td></tr>`;
                    return;
                }

                data.forEach(sub => {
                    let badgeClass = "bg-warning text-dark";
                    if (sub.status === "Completed") badgeClass = "bg-success text-white";
                    if (sub.status === "Failed") badgeClass = "bg-danger text-white";
                    if (sub.status === "Downloading") badgeClass = "bg-info text-white";

                    const dateStr = new Date(sub.created_at).toLocaleString();

                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${sub.student_id}</strong></td>
                            <td><a href="${sub.github_url}" target="_blank" class="text-decoration-none text-truncate d-inline-block" style="max-width: 150px;">${sub.github_url}</a></td>
                            <td><span class="badge status-badge ${badgeClass}">${sub.status}</span></td>
                            <td><span class="text-primary score-badge">${sub.code_quality_score}%</span></td>
                            <td><span style="color: #6366f1;" class="score-badge">${sub.architecture_score}%</span></td>
                            <td><span class="text-success score-badge">${sub.feature_score}%</span></td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary" onclick="showFeedbackModal('${sub.student_id}')">
                                    <i class="fa-solid fa-magnifying-glass-chart"></i> View
                                </button>
                            </td>
                            <td class="text-muted small">${dateStr}</td>
                        </tr>
                    `;
                });
            } catch (err) { console.error(err); }
        }

        // Function to display the modal and fill in data
        function showFeedbackModal(studentId) {
            const submission = localSubmissionsCache.find(sub => sub.student_id === studentId);
            if (submission) {
                document.getElementById('modalStudentId').innerText = submission.student_id;
                document.getElementById('modalFeedbackContent').innerText = submission.ai_feedback || "No feedback generated for this status.";
                
                // Trigger Bootstrap Modal
                const myModal = new bootstrap.Modal(document.getElementById('feedbackModal'));
                myModal.show();
            }
        }

        window.onload = loadSubmissions;
    </script>
</body>
</html>
