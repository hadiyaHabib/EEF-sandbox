<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EEF | Leaderboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
        .navbar-brand { font-weight: bold; }
        .leaderboard-card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .rank-badge { font-size: 1.2rem; width: 35px; height: 35px; display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; font-weight: bold; }
        .rank-1 { background-color: #ffd700; color: #000; } /* Gold */
        .rank-2 { background-color: #c0c0c0; color: #000; } /* Silver */
        .rank-3 { background-color: #cd7f32; color: #fff; } /* Bronze */
        .rank-other { background-color: #e9ecef; color: #495057; }
    </style>
</head>
<body>

    <!-- Nav Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="fa-solid fa-code-branch me-2"></i>EEF SANDBOX</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="/"><i class="fa-solid fa-gauge me-1"></i> Dashboard</a>
                <a class="nav-link text-white active fw-bold" href="/leaderboard"><i class="fa-solid fa-trophy me-1 text-warning"></i> Leaderboard</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="card leaderboard-card">
                    <div class="card-header bg-primary text-white py-3">
                        <h4 class="mb-0 text-center"><i class="fa-solid fa-medal me-2 text-warning"></i> EEF Engineering Benchmarking Leaderboard</h4>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-striped align-middle mb-0 text-center">
                                <thead class="table-dark">
                                    <tr>
                                        <th style="width: 10%;">Rank</th>
                                        <th style="width: 25%;">Student ID</th>
                                        <th style="width: 20%;">Avg Engineering Score</th>
                                        <th style="width: 15%;">Code Quality</th>
                                        <th style="width: 15%;">Architecture</th>
                                        <th style="width: 15%;">Features</th>
                                    </tr>
                                </thead>
                                <tbody id="leaderboardBody">
                                    <!-- Dynamic rows append here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function fetchLeaderboard() {
            try {
                const response = await fetch("/api/v1/leaderboard/data");
                const data = await response.json();
                const tbody = document.getElementById("leaderboardBody");
                tbody.innerHTML = "";

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="6" class="py-4 text-muted">No completed evaluations found.</td></tr>`;
                    return;
                }

                data.forEach(item => {
                    let rankClass = "rank-other";
                    let rankIcon = "";
                    if (item.rank === 1) { rankClass = "rank-1"; rankIcon = "👑 "; }
                    else if (item.rank === 2) rankClass = "rank-2";
                    else if (item.rank === 3) rankClass = "rank-3";

                    tbody.innerHTML += `
                        <tr>
                            <td><span class="rank-badge ${rankClass}">${item.rank}</span></td>
                            <td><strong>${rankIcon}${item.student_id}</strong></td>
                            <td><span class="badge bg-success fs-6">${item.avg_score}%</span></td>
                            <td>${item.code_quality}%</td>
                            <td>${item.architecture}%</td>
                            <td>${item.features}%</td>
                        </tr>
                    `;
                });
            } catch (err) {
                console.error("Error loading leaderboard:", err);
            }
        }
        window.onload = fetchLeaderboard;
    </script>
</body>
</html>
